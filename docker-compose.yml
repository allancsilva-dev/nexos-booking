services:
  postgres:
    image: postgres:17-alpine
    container_name: nexos-booking-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nexos-booking-web
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
    ports:
      - "${WEB_PORT}:3000"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nexos-booking-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      APP_RUNTIME_USER: ${APP_RUNTIME_USER}
      APP_RUNTIME_PASSWORD: ${APP_RUNTIME_PASSWORD}
      DATABASE_RUNTIME_URL: ${DATABASE_RUNTIME_URL}
    ports:
      - "${API_PORT}:3001"

volumes:
  postgres_data:
